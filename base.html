<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 홈페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            /* 사이드바 화면 높이: 100이면 전체. */
            min-height: 100vh;
            background-color: #5F00FF;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }
        .sidebar a:hover {
        /* 마우스 올렸을 때 색상 */
            background-color: #D1B2FF;
        }
        footer {
            background-color: #f8f9fa;
            padding: 20px 0;
            border-top: 1px solid #eee;
            color: #aaa;
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar">
                <h4 class="text-white ps-3">MY HOME</h4>
                <hr class="text-white">
                <div class="nav flex-column">
                    <a href="/">홈</a>
                    <a href="/about">소개</a>
                    <a href="/guestbook">방명록</a>
                </div>
            </nav>

            <main class="col-md-10 mt-4">
                {% block content %}
                {% endblock %}
            </main>
        </div>
        <footer>
            <div class="container">
                <div class="mb-1">
                    <span class="fw-bold">목동이 코딩회사</span> |
                    대표이사: 목금동
                    주소: 서울특별시 스마트구 5000번지 |
                    전화: 010-1234-5678
                </div>
                <div>Copyright &copy; C-Coding Corp. All Rights Reserved.</div>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
