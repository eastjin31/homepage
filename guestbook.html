{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="text-center mb-4 mt-3">📝 방명록</h2>

        <div class="card shadow-sm mb-5">
            <div class="card-body">
                <form action="/write" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">닉네임</label>
                            <input type="text" name="name" class="form-control" placeholder="이름" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">비밀번호</label>
                            <input type="password" name="password" class="form-control" placeholder="수정/삭제용" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">내용</label>
                        <textarea name="content" class="form-control" rows="3" placeholder="내용을 입력하세요" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">등록하기</button>
                </form>
            </div>
        </div>

        <div class="messages">
            {% for msg in messages %}
            <div class="card mb-3 border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="fw-bold text-primary mb-0">{{ msg.name }}</h6>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#editModal{{ msg.id }}">수정</button>
                            <form action="/delete/{{ msg.id }}" method="POST" class="d-flex gap-1">
                                <input type="password" name="password" class="form-control form-control-sm" style="width: 70px;" placeholder="비번" required>
                                <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                            </form>
                        </div>
                    </div>
                    <p class="card-text">{{ msg.content }}</p>
                </div>
            </div>

            <div class="modal fade" id="editModal{{ msg.id }}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form action="/edit/{{ msg.id }}" method="POST">
                            <div class="modal-header">
                                <h5 class="modal-title">글 수정하기</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">내용</label>
                                    <textarea name="content" class="form-control" rows="4" required>{{ msg.content }}</textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">비밀번호 확인</label>
                                    <input type="password" name="password" class="form-control" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                                <button type="submit" class="btn btn-primary">수정 완료</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
